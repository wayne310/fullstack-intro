<!DOCTYPE html>
<html>
<head>
    <title>CSS Basics</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <h1>CSS Basics Project</h1>
    </header>

    <main class="main">

        <section class="box">
            <h2>Box Model Example</h2>
            <p>This section demonstrates margin, padding, and border.</p>
        </section>

        <section class="flex-container">
            <div class="flex-item">Item 1</div>
            <div class="flex-item">Item 2</div>
            <div class="flex-item">Item 3</div>
        </section>

        <section class="form-section">
            <h2>Styled Form</h2>

            <form>
                <label>Name:</label>
                <input type="text">

                <label>Email:</label>
                <input type="email">

                <button type="submit">Submit</button>
            </form>
        </section>

    </main>

    <footer class="footer">
        <p>Footer Section</p>
    </footer>

</body>
</html>
